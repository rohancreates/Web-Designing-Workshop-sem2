<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Number Checker</title>
  <link rel="stylesheet" href="styling.css">
</head>
<body>
  <script src="index.js" defer></script>
  <main class="container">
    <h1>Welcome to luffy's prime number checker</h1>
    <p>Number daalo , check kro , aur kuch nahi bataunga</p>
    <p>kuch ulta seedha mat daalna jese 0 ya negative</p>

    <div class="form-group">
      <label for="numberInput">Number</label>
      <input
        id="numberInput"
        placeholder="idhr likho"
        min="0"
        step="1"
      >
    </div>
  <button id="checkBtn" type="button">Check</button>
  <p id="result" aria-live="polite"></p>
  </main>

 
</body>
</html>
